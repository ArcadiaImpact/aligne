# Test suite for aligne.
#
# The package is installed WITHOUT its heavy/managed extras: the `tinker` and
# `audit` extras are not on public PyPI / are GPU-only. The test suite is
# deliberately written to run on the lean core install — heavy-dep paths are
# lazily imported and skip when unavailable.
name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  aligne:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv venv -p 3.12
      # The `inspect` extra is pure-PyPI, so CI installs it and the
      # inspect-ported metric tests run for real (they importorskip on
      # lean local installs). tinker/audit stay excluded as before.
      - run: uv pip install -e '.[inspect]' pytest pytest-asyncio
      # Invoke the venv directly rather than `uv run` so the uv.lock (which
      # pins the git-sourced `audit` extra) is not re-validated on every CI run.
      - run: .venv/bin/python -m pytest -q
      # Unused-import/name hygiene (complements tests/test_design_rules.py).
      - run: uvx ruff check src tests --select F
