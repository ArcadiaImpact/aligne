# Chat-mode J-lens (spec §3.1 extension): target=assistant gives the lens
# the "what might the Assistant say later" reading — for auditing organisms
# in deployment-like context. NOT for diffing against a pretrain-fit lens
# (fitting distribution is a confound, spec §3.2).
model: Qwen/Qwen3-1.7B
dtype: bfloat16
device_map: auto
batch_size: 4          # chat transcripts are long; watch activation memory
estimator: exact
seed: 0
output_dir: jlens-out/qwen3-1.7b-chat

dataset:
  kind: chat
  source: "hf:allenai/WildChat-1M:default:train:conversation"
  n_seqs: 512
  max_seq_len: 2048
  source_mask: all
  target_mask: assistant
  data_seed: 0

convergence:
  metric: jaccard
  k: 25
  tolerance: 0.90
  n_eval_activations: 512
  min_seqs: 32
  max_seqs: 512
